<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Queue Simulation System (2 Servers)</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Queue Simulation System </h1>

    <input type="number" id="customersCount" placeholder="Number of customers">
    <button onclick="runSimulation()">Run Simulation</button>

    <table id="resultTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>InterArrival</th>
                <th>Arrival</th>
                <th>Service Time</th>
                <th>Start</th>
                <th>End</th>
                <th>Server</th>
                <th>Waiting</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3 id="avgWaiting"></h3>

    <script src="script.js"></script>
</body>

</html>
